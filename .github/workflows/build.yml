name: Build
on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-2025
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install frontend deps
        run: npm install
        working-directory: frontend
      - name: Build Angular frontend
        run: npx ng build
        working-directory: frontend
      - name: Build Tauri app
        run: cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: ""
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: gaming-app-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/gaming-app.exe

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgdk-pixbuf2.0-dev \
            libatk1.0-dev libpango1.0-dev libcairo2-dev libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libudev-dev libevdev-dev libdbus-1-dev
      - name: Install frontend deps
        run: npm install
        working-directory: frontend
      - name: Build Angular frontend
        run: npx ng build
        working-directory: frontend
      - name: Build Tauri app
        run: cargo build --release
        working-directory: src-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: gaming-app-linux
          path: src-tauri/target/release/gaming-app

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libopus-dev
      - name: Run tests
        run: cargo test --workspace
